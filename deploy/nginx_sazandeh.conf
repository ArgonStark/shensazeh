# Nginx site config for Sazandeh
# Put at: /etc/nginx/sites-available/sazandeh  (then symlink to sites-enabled)
# Replace YOUR_DOMAIN_OR_IP with your domain (e.g. sazandeh.ir) or the server IP.

server {
    listen 80;
    server_name shensazeh.ir www.shensazeh.ir;

    client_max_body_size 25M;

    # Static files (collectstatic output)
    location /static/ {
        alias /var/www/sazandeh/staticfiles/;
        expires 30d;
        access_log off;
    }

    # User-uploaded media (product/category images)
    location /media/ {
        alias /var/www/sazandeh/media/;
        expires 7d;
        access_log off;
    }

    # Everything else -> gunicorn
    location / {
        proxy_pass http://unix:/run/sazandeh.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
