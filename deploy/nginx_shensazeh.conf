# Nginx site config for Shensazeh
# Put at: /etc/nginx/sites-available/shensazeh  (then symlink to sites-enabled)
# server_name is set to shensazeh.ir / www.shensazeh.ir — edit only if testing by raw IP.

server {
    listen 80;
    server_name shensazeh.ir www.shensazeh.ir;

    client_max_body_size 25M;

    # Static files (collectstatic output)
    location /static/ {
        alias /var/www/shensazeh/staticfiles/;
        expires 30d;
        access_log off;
    }

    # User-uploaded media (product/category images)
    location /media/ {
        alias /var/www/shensazeh/media/;
        expires 7d;
        access_log off;
    }

    # Everything else -> gunicorn
    location / {
        proxy_pass http://unix:/run/shensazeh/shensazeh.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
