<!-- Toast notifications container -->
<div x-data x-cloak class="fixed bottom-4 left-4 z-[100] space-y-2" style="direction:ltr">
  <template x-for="toast in $store.toast.items" :key="toast.id">
    <div x-show="toast.visible"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-4"
         class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg text-sm font-medium min-w-[280px]"
         :class="{
           'bg-green-600 text-white': toast.type === 'success',
           'bg-red-600 text-white': toast.type === 'error',
           'bg-yellow-500 text-white': toast.type === 'warning',
           'bg-blue-600 text-white': toast.type === 'info',
         }">
      <span x-text="toast.message" style="direction:rtl"></span>
      <button @click="$store.toast.remove(toast.id)" class="mr-auto text-white/80 hover:text-white">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </template>
</div>

<script>
document.addEventListener('alpine:init', () => {
  Alpine.store('toast', {
    items: [],
    show(message, type = 'success') {
      const id = Date.now();
      this.items.push({ id, message, type, visible: true });
      setTimeout(() => this.remove(id), 3500);
    },
    remove(id) {
      const item = this.items.find(i => i.id === id);
      if (item) item.visible = false;
      setTimeout(() => { this.items = this.items.filter(i => i.id !== id); }, 300);
    }
  });
});
</script>
