<div x-show="deleteModal.open" x-cloak x-transition.opacity
     class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl" @click.outside="deleteModal.open = false">
    <div class="text-center">
      <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-6 h-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-800 mb-2">آیا مطمئن هستید؟</h3>
      <p class="text-sm text-gray-500 mb-6">این عملیات قابل بازگشت نیست.</p>
    </div>
    <div class="flex gap-3">
      <form :action="deleteModal.url" method="post" class="flex-1">
        {% csrf_token %}
        <button type="submit" class="w-full bg-red-600 text-white rounded-xl py-2.5 text-sm font-medium hover:bg-red-700 transition">بله، حذف شود</button>
      </form>
      <button @click="deleteModal.open = false" class="flex-1 border border-gray-200 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 transition">انصراف</button>
    </div>
  </div>
</div>
